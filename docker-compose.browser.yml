services:
  delegate1-browser:
    build:
      context: .
      dockerfile: Dockerfile.browser
    ports:
      - "8081:8081"   # App
      - "5900:5900"   # VNC
    volumes:
      - ./local-volumes/runtime-data:/app/runtime-data
      - ./local-volumes/gh-copilot-data:/root/.local/share/gh
    env_file:
      - .env
    environment:
      - BROWSER_ENABLED=true
      - DOCKER=true
    restart: unless-stopped
