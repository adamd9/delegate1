name: Deploy to Server

on:
  push:
    branches:
      - '**'  # Trigger on all branches

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_continue: ${{ steps.check.outputs.should_continue }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2      
      - name: Check if first commit on branch
        id: check
        run: |
          echo "DEBUG: Branch name: ${{ github.ref_name }}"
          # Fetch main branch to ensure we have the latest data
          git fetch origin main --quiet
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEBUG: On main branch; skipping unique commit check"
            echo "should_continue=true" >> $GITHUB_OUTPUT
          else
            # Count commits that are on this branch but not on main
            UNIQUE_COMMITS=$(git rev-list --count origin/main..HEAD)
            echo "DEBUG: Unique commits not on main: $UNIQUE_COMMITS"
            if [ "$UNIQUE_COMMITS" -eq 0 ]; then
              echo "should_continue=false" >> $GITHUB_OUTPUT
              echo "DEBUG: should_continue set to false (no unique commits on branch)"
            else
              echo "should_continue=true" >> $GITHUB_OUTPUT
              echo "DEBUG: should_continue set to true ($UNIQUE_COMMITS unique commits found)"
            fi
          fi

  build:
    needs: [precheck]
    if: needs.precheck.outputs.should_continue == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (webapp)
        working-directory: webapp
        run: npm ci

      - name: Build webapp (static export)
        working-directory: webapp
        env:
          NEXT_PUBLIC_REMOTE_BACKEND: ${{ github.ref_name == 'main' && 'https://hk.api.mdlg.dev' || 'https://hk-dev.api.mdlg.dev' }}
        run: npm run build

      - name: Copy webapp static export into backend artifact path
        run: cp -r webapp/out websocket-server/webapp-out

      - name: Install dependencies (backend)
        working-directory: websocket-server
        run: npm ci

      - name: Build backend
        working-directory: websocket-server
        run: npm run build

      - name: Write build info
        run: |
          echo "{\"commitId\":\"$(git rev-parse --short HEAD)\",\"commitMessage\":$(git log -1 --pretty=%s | jq -Rs .)}" \
            > websocket-server/client/build-info.json

      - name: List build outputs
        run: ls -la websocket-server/dist && ls -la websocket-server/webapp-out

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          include-hidden-files: true
          name: backend-build
          path: |
            websocket-server/dist
            websocket-server/package.json
            websocket-server/scripts
            websocket-server/webapp-out
            websocket-server/client

  trigger-dockerserver-deploy:
    needs: [precheck, build]
    if: needs.precheck.outputs.should_continue == 'true'
    runs-on: ubuntu-latest
    outputs:
      domain: ${{ env.DOMAIN }}
      api_domain: ${{ env.API_DOMAIN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set domains based on branch
        id: set-domains
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DOMAIN=hk.mdlg.dev" >> $GITHUB_ENV
            echo "API_DOMAIN=hk.api.mdlg.dev" >> $GITHUB_ENV
          else
            # All non-main branches use dev domains
            echo "DOMAIN=hk-dev.mdlg.dev" >> $GITHUB_ENV
            echo "API_DOMAIN=hk-dev.api.mdlg.dev" >> $GITHUB_ENV
          fi

      - name: Trigger Docker Server Deployment for Main Domain
        id: trigger_deploy
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCKER_SERVER_ACTIONS_TOKEN }}
          repository: adamd9/docker-server-dev
          event-type: deploy-hk
          client-payload: '{"frontendDomain": "${{ env.DOMAIN }}", "backendDomain": "${{ env.API_DOMAIN }}"}'

      - name: Set deployed output
        id: set_deployed_output
        run: |
          if [ "${{ steps.trigger_deploy.outcome }}" = "success" ]; then
            echo "deployed=true" >> $GITHUB_OUTPUT
          else
            echo "deployed=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

  wait-backend-health:
    needs: [precheck, trigger-dockerserver-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Wait 5 minutes for deployment
        run: sleep 300
      - name: Check backend health
        run: |
          for i in {1..30}; do
            if curl -sSf "https://${{ needs.trigger-dockerserver-deploy.outputs.api_domain }}/public-url"; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 10
          done
          echo "Backend did not become available in time."
          exit 1
