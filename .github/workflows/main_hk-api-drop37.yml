# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - hk-api-drop37

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies and build backend
        run: |          
          cd websocket-server && npm install && npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-backend
          cp -r websocket-server/dist deploy-backend/
          cp websocket-server/package.json deploy-backend/
          cd deploy-backend && npm install --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ${{ github.workspace }}/deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D339CDAD1BDB4BCC994BF83E40A65D65 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1FCCF60872D04077A4D9E5690F31B4FA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2DFEC4708A5843D7B6C62022D4531C96 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hk-api-drop37'
          slot-name: 'Production'
          package: ${{ github.workspace }}/deploy
          