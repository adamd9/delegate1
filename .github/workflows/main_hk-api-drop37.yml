name: Build and deploy container to Azure Web App - hk-api-drop37

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC Azure login
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Write build info
        run: |
          BUILD_INFO="{\"commitId\":\"$(git rev-parse --short HEAD)\",\"commitMessage\":$(git log -1 --pretty=%s | jq -Rs .),\"branch\":\"${GITHUB_REF_NAME}\",\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          echo "$BUILD_INFO" > client/build-info.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D339CDAD1BDB4BCC994BF83E40A65D65 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1FCCF60872D04077A4D9E5690F31B4FA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2DFEC4708A5843D7B6C62022D4531C96 }}

      - name: Login to ACR
        run: az acr login --name appservicesdevacr

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -f Dockerfile.browser \
            -t appservicesdevacr.azurecr.io/hk-api:latest \
            .
          docker push appservicesdevacr.azurecr.io/hk-api:latest

      - name: Restart Azure Web App
        run: az webapp restart --name hk-api-drop37 --resource-group AppServiceDev
          