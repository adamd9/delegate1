# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - hk-drop37

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies and build frontend
        env:
          NEXT_PUBLIC_REMOTE_BACKEND: ${{ vars.NEXT_PUBLIC_REMOTE_BACKEND }}
        run: |
          # Generate build info while still in the git repo
          node webapp/scripts/write-build-info.js
          # Build in a clean temp directory with no parent workspace package.json
          # so npm installs all deps locally (no hoisting to monorepo root)
          cp -r webapp /tmp/webapp-build
          cd /tmp/webapp-build
          npm install
          # Run next build directly - build-info.json already generated above
          npx next build
          # Assemble flat deploy package
          mkdir -p /tmp/deploy-frontend
          cp .next/standalone/server.js .next/standalone/package.json /tmp/deploy-frontend/
          cp -r public /tmp/deploy-frontend/
          cp -r .next/standalone/.next /tmp/deploy-frontend/.next
          cp -r .next/static /tmp/deploy-frontend/.next/
          # Create node_modules.tar.gz from standalone's self-contained node_modules
          # (overwrites any stale Oryx tar.gz; Azure startup extracts this to /node_modules)
          tar -czf /tmp/deploy-frontend/node_modules.tar.gz -C .next/standalone/node_modules .
          echo "Deploy package contents (including hidden):"
          ls -la /tmp/deploy-frontend/
          echo "Deploy .next contents:"
          ls /tmp/deploy-frontend/.next/
          echo "next in standalone node_modules?"
          ls .next/standalone/node_modules/next/package.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: /tmp/deploy-frontend
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ${{ github.workspace }}/deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E9D0F6F17AA747F7B3681074F6003F9D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D82C9D73875045729CF31DA0C8D23A52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48376EDA390540089CF3BB955A065E5B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hk-drop37'
          slot-name: 'Production'
          package: ${{ github.workspace }}/deploy
          