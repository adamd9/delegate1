# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - hk-drop37

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies and build frontend
        run: |          
          cd webapp && npm install && npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-frontend
          cp -r webapp/.next deploy-frontend/
          cp -r webapp/public deploy-frontend/
          cp webapp/package.json deploy-frontend/
          cp webapp/next.config.mjs deploy-frontend/
          cp -r webapp/node_modules deploy-frontend/
          cd deploy-frontend

      - name: Verify next is in deploy package
        run: |
          echo "=== webapp/node_modules/next exists? ==="
          ls webapp/node_modules/next 2>/dev/null && echo "YES - in webapp/node_modules" || echo "NO - not in webapp/node_modules"
          echo "=== root node_modules/next exists? ==="
          ls node_modules/next 2>/dev/null && echo "YES - in root node_modules (hoisted!)" || echo "NO - not in root node_modules"
          echo "=== deploy-frontend/node_modules/next exists? ==="
          ls deploy-frontend/node_modules/next 2>/dev/null && echo "YES - in deploy package" || echo "NO - MISSING from deploy package"
          echo "=== deploy-frontend/node_modules package count ==="
          ls deploy-frontend/node_modules | wc -l
          echo "=== deploy-frontend contents ==="
          ls -la deploy-frontend/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ${{ github.workspace }}/deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E9D0F6F17AA747F7B3681074F6003F9D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D82C9D73875045729CF31DA0C8D23A52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48376EDA390540089CF3BB955A065E5B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hk-drop37'
          slot-name: 'Production'
          package: ${{ github.workspace }}/deploy
          