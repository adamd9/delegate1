# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - hk-drop37

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies and build frontend
        env:
          NEXT_PUBLIC_REMOTE_BACKEND: ${{ vars.NEXT_PUBLIC_REMOTE_BACKEND }}
        run: |          
          cd webapp && npm install && npm run build

      - name: Prepare deployment package
        run: |
          cp -r webapp/public webapp/.next/standalone/webapp/
          cp -r webapp/.next/static webapp/.next/standalone/webapp/.next/
          # Merge root standalone node_modules into webapp dir so server.js finds them without the parent directory
          cp -rn webapp/.next/standalone/node_modules/. webapp/.next/standalone/webapp/node_modules/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: webapp/.next/standalone/webapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ${{ github.workspace }}/deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E9D0F6F17AA747F7B3681074F6003F9D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D82C9D73875045729CF31DA0C8D23A52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48376EDA390540089CF3BB955A065E5B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hk-drop37'
          slot-name: 'Production'
          package: ${{ github.workspace }}/deploy
          