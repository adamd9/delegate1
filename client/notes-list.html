<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes · HK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1b1d27; --surface: #22253a; --surface2: #2a2d42; --surface3: #181a26;
      --border: #2e3150; --border2: #383b5e; --accent: #818cf8; --green: #34d399;
      --amber: #fbbf24; --red: #f87171; --blue: #60a5fa;
      --text: #e2e4f0; --text-mid: #6b7194; --text-dim: #3d4268;
      --font: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 48px; min-height: 48px;
      background: var(--surface3); border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .hdr-left { display: flex; align-items: center; gap: 12px; }
    .hdr-right { display: flex; align-items: center; gap: 8px; }
    h1 { font-size: 14px; font-weight: 600; color: var(--text); }
    .back-btn, .hdr-btn {
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2);
      background: transparent; color: var(--text-mid); font-size: 11px;
      font-family: var(--font); cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .back-btn:hover, .hdr-btn:hover { color: var(--text); }
    .search-input {
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2);
      background: var(--surface); color: var(--text); font-size: 12px;
      font-family: var(--font); width: 200px; outline: none;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Notes list ── */
    .note-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 18px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .note-card:hover { border-color: var(--accent); background: var(--surface2); }
    .note-card + .note-card { margin-top: 8px; }
    .note-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .note-meta {
      display: flex; align-items: center; gap: 10px;
      font-size: 10px; color: var(--text-dim); font-family: var(--font);
    }
    .note-preview {
      font-size: 12px; color: var(--text-mid); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; word-break: break-word;
    }
    .note-actions {
      display: flex; align-items: center; gap: 6px; margin-top: 2px;
    }
    .note-action {
      padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border2);
      background: transparent; color: var(--text-mid); font-size: 10px;
      font-family: var(--font); cursor: pointer;
    }
    .note-action:hover { color: var(--text); border-color: var(--text-mid); }
    .note-action.delete:hover { color: var(--red); border-color: var(--red); }

    .empty {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: var(--text-dim); font-size: 12px; font-family: var(--font);
    }

    .count-badge {
      font-size: 10px; color: var(--text-dim); font-family: var(--font);
    }

    /* ── Note detail overlay ── */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      width: 90vw; max-width: 800px; height: 80vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .detail-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-close {
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2);
      background: transparent; color: var(--text-mid); font-size: 11px;
      font-family: var(--font); cursor: pointer;
    }
    .detail-close:hover { color: var(--text); }
    .detail-iframe { flex: 1; border: none; background: #fff; }
  </style>
</head>
<body>
  <header>
    <div class="hdr-left">
      <a class="back-btn" href="/">← back</a>
      <h1>📌 Notes</h1>
      <span class="count-badge" id="count-badge"></span>
    </div>
    <div class="hdr-right">
      <input class="search-input" id="search" type="text" placeholder="search notes…" />
      <button class="hdr-btn" id="refresh-btn">↺ refresh</button>
    </div>
  </header>

  <div class="content" id="content">
    <div class="empty" id="empty-msg">Loading…</div>
  </div>

  <!-- Detail overlay -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel">
      <div class="detail-header">
        <span class="detail-title" id="detail-title"></span>
        <button class="detail-close" id="detail-open-tab">↗ open</button>
        <button class="detail-close" id="detail-copy">⧉ copy link</button>
        <button class="detail-close" id="detail-close">close</button>
      </div>
      <iframe class="detail-iframe" id="detail-iframe"></iframe>
    </div>
  </div>

<script>
const content = document.getElementById('content');
const emptyMsg = document.getElementById('empty-msg');
const searchInput = document.getElementById('search');
const countBadge = document.getElementById('count-badge');
let allNotes = [];
let currentDetailId = null;

async function fetchNotes(query) {
  const qs = query ? `?q=${encodeURIComponent(query)}` : '';
  const res = await fetch(`/api/notes${qs}`);
  if (!res.ok) throw new Error('Failed to fetch notes');
  return res.json();
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(ts).toLocaleDateString();
}

function truncate(text, max) {
  if (!text) return '';
  const clean = text.replace(/\n/g, ' ').trim();
  return clean.length > max ? clean.slice(0, max) + '…' : clean;
}

function renderNotes(notes) {
  allNotes = notes;
  content.querySelectorAll('.note-card').forEach(el => el.remove());
  countBadge.textContent = notes.length ? `(${notes.length})` : '';

  if (notes.length === 0) {
    emptyMsg.textContent = searchInput.value ? 'No matching notes' : 'No notes yet';
    emptyMsg.style.display = '';
    return;
  }
  emptyMsg.style.display = 'none';

  // Sort newest first
  const sorted = [...notes].sort((a, b) => b.timestamp - a.timestamp);
  for (const note of sorted) {
    const card = document.createElement('div');
    card.className = 'note-card';
    card.innerHTML = `
      <div class="note-title">${esc(note.title)}</div>
      <div class="note-preview">${esc(truncate(note.content, 200))}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="note-meta">
          <span>${timeAgo(note.timestamp)}</span>
          <span>id: ${esc(note.id.slice(0, 8))}</span>
        </div>
        <div class="note-actions">
          <button class="note-action" data-action="view" data-id="${esc(note.id)}">view</button>
          <button class="note-action" data-action="copy" data-id="${esc(note.id)}">copy link</button>
          <button class="note-action delete" data-action="delete" data-id="${esc(note.id)}">delete</button>
        </div>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.note-action')) return;
      openDetail(note);
    });
    content.appendChild(card);
  }

  // Wire action buttons
  content.querySelectorAll('.note-action').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if (action === 'view') {
        const note = allNotes.find(n => n.id === id);
        if (note) openDetail(note);
      } else if (action === 'copy') {
        const url = `${location.origin}/notes/${id}`;
        try { await navigator.clipboard.writeText(url); btn.textContent = '✓'; setTimeout(() => btn.textContent = 'copy link', 1500); } catch {}
      } else if (action === 'delete') {
        if (!confirm('Delete this note?')) return;
        const res = await fetch(`/api/notes/${id}`, { method: 'DELETE' });
        if (res.ok) loadNotes();
      }
    });
  });
}

function openDetail(note) {
  currentDetailId = note.id;
  document.getElementById('detail-title').textContent = note.title || 'Note';
  document.getElementById('detail-iframe').src = `/notes/${note.id}`;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-iframe').src = '';
  currentDetailId = null;
}

async function loadNotes() {
  try {
    const notes = await fetchNotes(searchInput.value.trim());
    renderNotes(notes);
  } catch (e) {
    emptyMsg.textContent = 'Failed to load notes';
    emptyMsg.style.display = '';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Events ──

document.getElementById('refresh-btn').addEventListener('click', loadNotes);

let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadNotes, 300);
});

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeDetail();
});
document.getElementById('detail-open-tab').addEventListener('click', () => {
  if (currentDetailId) window.open(`/notes/${currentDetailId}`, '_blank', 'noopener,noreferrer');
});
document.getElementById('detail-copy').addEventListener('click', async () => {
  if (!currentDetailId) return;
  const btn = document.getElementById('detail-copy');
  try {
    await navigator.clipboard.writeText(`${location.origin}/notes/${currentDetailId}`);
    btn.textContent = '✓ copied';
    setTimeout(() => btn.textContent = '⧉ copy link', 1500);
  } catch {}
});

// ── WebSocket for live updates ──
function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/chat`);
  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'chat.note' || msg.type === 'chat.note.updated' || msg.type === 'chat.note.deleted') {
        loadNotes();
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWs, 3000);
  ws.onerror = () => {};
}

// ── Init ──
loadNotes();
connectWs();
</script>
</body>
</html>
