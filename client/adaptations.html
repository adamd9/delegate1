<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptations · HK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1b1d27; --surface: #22253a; --surface2: #2a2d42; --surface3: #181a26;
      --border: #2e3150; --border2: #383b5e; --accent: #818cf8; --accent-dim: rgba(129,140,248,0.12);
      --green: #34d399; --green-dim: rgba(52,211,153,0.1); --amber: #fbbf24;
      --red: #f87171; --red-dim: rgba(248,113,113,0.1); --blue: #60a5fa;
      --text: #e2e4f0; --text-mid: #6b7194; --text-dim: #3d4268;
      --font: 'SF Mono','Fira Code','Consolas',monospace;
      --font-ui: -apple-system,BlinkMacSystemFont,'Inter',sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; display: flex; flex-direction: column; font-size: 13px; -webkit-font-smoothing: antialiased; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface3); flex-shrink: 0; gap: 12px; }
    .hdr-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--text-mid); font-size: 11px; font-family: var(--font); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
    .back-btn:hover { color: var(--text); }
    h1 { font-size: 14px; font-weight: 600; }
    .btn { padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text-mid); font-size: 12px; font-family: var(--font-ui); cursor: pointer; transition: all 0.1s; }
    .btn:hover:not(:disabled) { color: var(--text); background: var(--surface2); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: rgba(129,140,248,0.2); }
    .main { flex: 1; display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }
    .sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface3); }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .sidebar-header { padding: 12px 16px 8px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); font-family: var(--font); }
    .item-row { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .item-row:hover { background: var(--surface2); }
    .item-row.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); }
    .item-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .item-id { font-size: 10px; color: var(--text-dim); font-family: var(--font); margin-top: 2px; }
    .item-desc { font-size: 11px; color: var(--text-mid); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; border: 1px solid; }
    .badge-green { background: var(--green-dim); color: var(--green); border-color: rgba(52,211,153,0.25); }
    .badge-gray { background: transparent; color: var(--text-dim); border-color: var(--border2); }
    .editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 20px; gap: 14px; overflow-y: auto; }
    .editor::-webkit-scrollbar { width: 3px; }
    .editor::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .no-selection { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-family: var(--font); font-size: 12px; }
    .field-label { font-size: 11px; color: var(--text-mid); margin-bottom: 5px; font-family: var(--font); letter-spacing: 0.04em; }
    .field-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-style: italic; }
    input[type="text"], textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; padding: 8px 12px; font-family: var(--font-ui); font-size: 13px;
      color: var(--text); outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 200px; font-family: var(--font); font-size: 12px; line-height: 1.5; }
    .toggle-row { display: flex; align-items: center; gap: 10px; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider::after { content: ''; position: absolute; left: 2px; top: 2px; width: 14px; height: 14px; background: var(--text-dim); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    input:checked + .toggle-slider { background: var(--green-dim); border-color: rgba(52,211,153,0.3); }
    input:checked + .toggle-slider::after { transform: translateX(16px); background: var(--green); }
    .save-row { display: flex; align-items: center; gap: 10px; }
    .save-status { font-size: 11px; font-family: var(--font); }
    .save-status.ok { color: var(--green); }
    .save-status.err { color: var(--red); }
    .err-banner { padding: 8px 12px; border-radius: 5px; background: var(--red-dim); border: 1px solid rgba(248,113,113,0.25); color: var(--red); font-size: 12px; }
    @media (max-width: 600px) { .main { grid-template-columns: 1fr; } .sidebar { max-height: 200px; } }
  </style>
</head>
<body>
  <header>
    <div class="hdr-left">
      <a class="back-btn" href="/">← back</a>
      <h1>Prompt Adaptations</h1>
    </div>
    <button class="btn" id="refresh-btn">refresh</button>
  </header>
  <div id="err-banner" class="err-banner" style="display:none;margin:12px 20px;"></div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">available items</div>
      <div id="item-list"></div>
    </div>
    <div class="editor" id="editor-panel">
      <div class="no-selection" id="no-selection">select an item to edit</div>
      <div id="edit-form" style="display:none;">
        <div id="edit-id-label" style="font-size:10px;color:var(--text-dim);font-family:var(--font);margin-bottom:4px;"></div>
        <div id="edit-desc-label" class="field-desc"></div>
        <div class="field-label">title</div>
        <input type="text" id="edit-title" />
        <div style="margin-top:12px;"></div>
        <div class="field-label">content</div>
        <textarea id="edit-content" rows="10"></textarea>
        <div style="margin-top:12px;"></div>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="edit-enabled" />
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:12px;color:var(--text);">enabled</span>
        </div>
        <div style="margin-top:16px;" class="save-row">
          <button class="btn btn-primary" id="save-btn">save</button>
          <span class="save-status" id="save-status"></span>
        </div>
      </div>
    </div>
  </div>

<script>
  let items = [];
  let selectedId = null;
  let saving = false;

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setError(msg) {
    const el = document.getElementById('err-banner');
    if (msg) { el.textContent = msg; el.style.display = ''; }
    else el.style.display = 'none';
  }

  async function load() {
    setError(null);
    try {
      const res = await fetch('/api/adaptations');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      items = await res.json();
      renderList();
    } catch (e) {
      setError(e.message || String(e));
    }
  }

  function renderList() {
    const list = document.getElementById('item-list');
    if (!items.length) { list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-dim);">no items</div>'; return; }
    list.innerHTML = items.map(it => {
      const enabled = it.enabled !== false;
      const scopeLabel = it.scope?.global ? 'global' : `${(it.scope?.agents||[]).join('/') || 'any'}/${(it.scope?.channels||[]).join('/') || 'any'}`;
      return `<div class="item-row${it.id === selectedId ? ' selected' : ''}" data-id="${esc(it.id)}">
        <div class="item-name">${esc(it.title)}</div>
        <div class="item-id">${esc(it.id)}</div>
        ${it.description ? `<div class="item-desc">${esc(it.description)}</div>` : ''}
        <div class="item-meta">
          <span class="badge ${enabled ? 'badge-green' : 'badge-gray'}">${enabled ? 'enabled' : 'disabled'}</span>
          <span style="font-size:10px;color:var(--text-dim);font-family:var(--font);">${esc(scopeLabel)}</span>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('.item-row').forEach(row => {
      row.addEventListener('click', () => selectItem(row.dataset.id));
    });
  }

  async function selectItem(id) {
    selectedId = id;
    renderList();
    try {
      const res = await fetch(`/api/adaptations/${id}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const it = await res.json();
      document.getElementById('no-selection').style.display = 'none';
      document.getElementById('edit-form').style.display = '';
      document.getElementById('edit-id-label').textContent = `editing: ${it.id}`;
      document.getElementById('edit-desc-label').textContent = it.description || '';
      document.getElementById('edit-title').value = it.title || '';
      document.getElementById('edit-content').value = it.content || '';
      document.getElementById('edit-enabled').checked = it.enabled !== false;
      document.getElementById('save-status').textContent = '';
    } catch (e) {
      setError(e.message);
    }
  }

  async function save() {
    if (!selectedId || saving) return;
    saving = true;
    const statusEl = document.getElementById('save-status');
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    statusEl.textContent = 'saving…';
    statusEl.className = 'save-status';
    try {
      const body = {
        title: document.getElementById('edit-title').value,
        content: document.getElementById('edit-content').value,
        enabled: document.getElementById('edit-enabled').checked,
      };
      const res = await fetch(`/api/adaptations/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      // Reload adaptations on the server
      await fetch('/api/adaptations/reload', { method: 'POST' });
      statusEl.textContent = 'saved';
      statusEl.className = 'save-status ok';
      await load();
      setTimeout(() => { statusEl.textContent = ''; }, 2000);
    } catch (e) {
      statusEl.textContent = e.message;
      statusEl.className = 'save-status err';
    } finally {
      saving = false;
      saveBtn.disabled = false;
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', load);
  document.getElementById('save-btn').addEventListener('click', save);

  load();
</script>
</body>
</html>
