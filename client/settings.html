<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings · HK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1b1d27; --surface: #22253a; --surface2: #2a2d42; --surface3: #181a26;
      --border: #2e3150; --accent: #818cf8; --green: #34d399; --amber: #fbbf24;
      --red: #f87171; --blue: #60a5fa; --text: #e2e4f0; --text-mid: #6b7194;
      --text-dim: #3d4268; --font: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px; height: 48px; min-height: 48px;
      background: var(--surface3); border-bottom: 1px solid var(--border);
    }
    .topbar-title { font-weight: 700; font-size: 14px; letter-spacing: 0.04em; color: var(--accent); }
    .topbar-subtitle { color: var(--text-mid); font-size: 12px; }
    .topbar-back { margin-right: auto; font-size: 12px; color: var(--text-mid); text-decoration: none; transition: color 0.15s; }
    .topbar-back:hover { color: var(--accent); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 180px; min-width: 180px; background: var(--surface3);
      border-right: 1px solid var(--border); padding: 12px 8px;
      display: flex; flex-direction: column; gap: 2px; overflow-y: auto;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-mid);
      transition: background 0.15s, color 0.15s; border: none; background: none;
      text-align: left; width: 100%;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--surface2); color: var(--accent); }
    .sidebar-icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-header { padding: 14px 18px 0; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .card-body { padding: 16px 18px; }
    .card+.card { margin-top: 16px; }

    /* ── iframe panels ── */
    .iframe-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .iframe-wrap iframe { display: block; width: 100%; height: 65vh; border: none; background: var(--bg); }

    /* ── Voice defaults ── */
    .presets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .presets-grid { grid-template-columns: 1fr; } }
    .preset-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .preset-header { padding: 10px 14px; font-size: 13px; font-weight: 600; }
    .preset-header.green { background: rgba(52,211,153,0.1); color: var(--green); border-bottom: 1px solid rgba(52,211,153,0.2); }
    .preset-header.amber { background: rgba(251,191,36,0.1); color: var(--amber); border-bottom: 1px solid rgba(251,191,36,0.2); }
    .preset-header small { display: block; font-size: 11px; font-weight: 400; opacity: 0.75; margin-top: 2px; }
    .preset-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--text-mid); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
    .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .badge-api { background: rgba(96,165,250,0.15); color: var(--blue); }
    .badge-sem { background: rgba(52,211,153,0.15); color: var(--green); }
    .badge-srv { background: rgba(251,191,36,0.15); color: var(--amber); }
    select.field-select {
      width: 100%; padding: 7px 10px; border-radius: 7px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; outline: none; cursor: pointer;
    }
    select.field-select:focus { border-color: var(--accent); }
    .field-hint { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
    .slider-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .slider-val { font-family: var(--font); font-size: 11px; color: var(--text-mid); }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .eagerness-row { display: flex; gap: 4px; }
    .eagerness-btn {
      flex: 1; padding: 5px; border-radius: 6px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: none; background: var(--surface2); color: var(--text-mid);
      transition: background 0.15s, color 0.15s;
    }
    .eagerness-btn.active { background: var(--accent); color: #fff; }
    .eagerness-btn:hover:not(.active) { background: var(--border); color: var(--text); }
    .save-row { display: flex; gap: 10px; align-items: center; padding-top: 8px; flex-wrap: wrap; }
    .save-msg { font-size: 12px; }
    .save-msg.ok { color: var(--green); }
    .save-msg.err { color: var(--red); }

    /* ── Buttons ── */
    .btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6d7cf4; }
    .btn-primary:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; }
    .btn-ghost { background: var(--surface2); color: var(--text-mid); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }
    .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    /* ── Catalog ── */
    .tool-jump-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 2; background: var(--bg); padding: 8px 0; }
    .filter-label { font-size: 11px; font-weight: 600; color: var(--text-mid); margin-right: 2px; }
    .filter-btn { font-size: 11px; padding: 4px 12px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-mid); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(129,140,248,0.08); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tool-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .tool-item { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .tool-item:last-child { border-bottom: none; }
    .tool-name { font-size: 13px; font-weight: 600; }
    .tool-id { font-family: var(--font); font-size: 11px; color: var(--text-mid); }
    .tool-desc { font-size: 12px; color: var(--text-mid); margin-top: 3px; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-mid); }
    .tag.origin { background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.3); color: var(--accent); }
    .agent-section { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .agent-header { padding: 12px 16px; background: var(--surface2); font-size: 13px; font-weight: 700; }
    .agent-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
    .sub-label { font-size: 12px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 5px; font-size: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    }
    .chip-remove { cursor: pointer; color: var(--text-dim); font-size: 10px; line-height: 1; padding: 0 2px; border: none; background: none; }
    .chip-remove:hover { color: var(--red); }
    .allow-add-row { display: flex; gap: 8px; align-items: center; }
    .allow-add-row select { flex: 1; }
    .resolved-pill { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); color: var(--blue); }
    .schema-pre {
      background: var(--surface3); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; font-family: var(--font); font-size: 11px; color: var(--text-mid);
      overflow-x: auto; max-height: 240px; overflow-y: auto; white-space: pre;
    }
    .agent-save-row { display: flex; align-items: center; gap: 10px; }

    /* ── About ── */
    .kv-pair { display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px; }
    .kv-key { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    .kv-val { font-family: var(--font); font-size: 13px; }

    /* ── Loading/error ── */
    .loading { color: var(--text-mid); font-size: 12px; padding: 16px 0; }
    .error-msg { color: var(--red); font-size: 12px; padding: 8px 0; }
    .empty-msg { color: var(--text-dim); font-size: 12px; font-style: italic; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .sidebar { display: none; }
      .topbar .mobile-tab-select { display: block; }
    }
    .mobile-tab-select {
      display: none; margin-left: auto; padding: 5px 8px; border-radius: 7px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-size: 12px; cursor: pointer; outline: none;
    }
    @media (max-width: 600px) { .mobile-tab-select { display: block; } }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <a class="topbar-back" href="/">← back</a>
    <span class="topbar-title">HK</span>
    <span class="topbar-subtitle">Settings</span>
    <select class="mobile-tab-select" id="mobile-tab">
      <option value="logs">Logs</option>
      <option value="voice">Voice</option>
      <option value="catalog">Tools</option>
      <option value="adaptations">Adaptations</option>
      <option value="mcp">MCP Servers</option>
      <option value="memory">Memory</option>
      <option value="maintenance">Maintenance</option>
      <option value="about">About</option>
    </select>
  </div>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <button class="sidebar-item active" data-tab="logs">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Logs
      </button>
      <button class="sidebar-item" data-tab="voice">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
        Voice
      </button>
      <button class="sidebar-item" data-tab="catalog">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        Tools
      </button>
      <button class="sidebar-item" data-tab="adaptations">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Adaptations
      </button>
      <button class="sidebar-item" data-tab="mcp">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        MCP Servers
      </button>
      <button class="sidebar-item" data-tab="memory">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Memory
      </button>
      <button class="sidebar-item" data-tab="maintenance">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Maintenance
      </button>
      <button class="sidebar-item" data-tab="about">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        About
      </button>
    </nav>

    <!-- Content -->
    <div class="content" id="content">
      <!-- Panels injected by JS -->
    </div>
  </div>

<script>
// ──────────────────────────────────────────────
// Tab routing
// ──────────────────────────────────────────────
const TABS = ['logs','voice','catalog','adaptations','mcp','memory','maintenance','about'];
let activeTab = null;

function getInitialTab() {
  const p = new URLSearchParams(window.location.search).get('tab');
  return (p && TABS.includes(p)) ? p : 'logs';
}

function setTab(tab) {
  if (!TABS.includes(tab)) tab = 'logs';
  activeTab = tab;

  // Sidebar
  document.querySelectorAll('.sidebar-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  // Mobile select
  const ms = document.getElementById('mobile-tab');
  if (ms) ms.value = tab;

  // URL
  const url = new URL(window.location.href);
  url.searchParams.set('tab', tab);
  window.history.replaceState(null, '', url.toString());

  // Content
  renderTab(tab);
}

document.querySelectorAll('.sidebar-item').forEach(btn => {
  btn.addEventListener('click', () => setTab(btn.dataset.tab));
});
document.getElementById('mobile-tab').addEventListener('change', e => setTab(e.target.value));

// ──────────────────────────────────────────────
// Content rendering dispatch
// ──────────────────────────────────────────────
const content = document.getElementById('content');

function renderTab(tab) {
  content.innerHTML = '';
  switch (tab) {
    case 'logs':        renderLogs(); break;
    case 'voice':       renderVoice(); break;
    case 'catalog':     renderCatalog(); break;
    case 'adaptations': renderAdaptations(); break;
    case 'mcp':         renderMcp(); break;
    case 'memory':      renderMemory(); break;
    case 'maintenance': renderMaintenance(); break;
    case 'about':       renderAbout(); break;
  }
}

// ──────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') {
      if (typeof v === 'string') e.setAttribute('style', v);
      else Object.assign(e.style, v);
    }
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function card(title, bodyContent) {
  const c = el('div', {class:'card'});
  c.appendChild(el('div', {class:'card-header'}, el('div', {class:'card-title'}, title)));
  const body = el('div', {class:'card-body'});
  if (typeof bodyContent === 'function') bodyContent(body);
  else body.appendChild(bodyContent);
  c.appendChild(body);
  return c;
}

// ──────────────────────────────────────────────
// Logs
// ──────────────────────────────────────────────
function renderLogs() {
  const c = card('Logs', body => {
    const wrap = el('div', {class:'iframe-wrap'});
    const iframe = el('iframe', {src: '/logs', title: 'Logs'});
    wrap.appendChild(iframe);
    body.appendChild(wrap);
  });
  content.appendChild(c);
}

// ──────────────────────────────────────────────
// Voice Defaults
// ──────────────────────────────────────────────
let voiceDefaults = null;

function renderVoice() {
  const c = card('Voice Defaults', body => {
    body.innerHTML = '<div class="loading">Loading…</div>';
  });
  content.appendChild(c);

  fetch('/voice-defaults')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      voiceDefaults = data;
      const body = c.querySelector('.card-body');
      body.innerHTML = '';
      body.appendChild(buildVoiceForm(data, c));
    })
    .catch(err => {
      c.querySelector('.card-body').innerHTML = `<div class="error-msg">Failed to load: ${err.message}</div>`;
    });
}

function buildVoiceForm(data, cardEl) {
  const frag = document.createDocumentFragment();

  const grid = el('div', {class:'presets-grid'});
  grid.appendChild(buildPresetEditor('normal', 'Normal', 'Quiet/normal conditions', data.normal, 'green', cardEl));
  grid.appendChild(buildPresetEditor('noisy', 'Noisy', 'Loud background noise', data.noisy, 'amber', cardEl));
  frag.appendChild(grid);

  const saveRow = el('div', {class:'save-row', style:{marginTop:'16px'}});
  const saveBtn = el('button', {class:'btn btn-primary'}, 'Save Changes');
  const resetBtn = el('button', {class:'btn btn-ghost'}, 'Reset to Defaults');
  const msg = el('span', {class:'save-msg'});
  saveRow.appendChild(saveBtn);
  saveRow.appendChild(resetBtn);
  saveRow.appendChild(msg);
  frag.appendChild(saveRow);

  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    msg.className = 'save-msg';
    msg.textContent = 'Saving…';
    try {
      const res = await fetch('/voice-defaults', {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(voiceDefaults),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      voiceDefaults = result.defaults;
      refreshVoiceForm(cardEl, voiceDefaults);
      msg.className = 'save-msg ok'; msg.textContent = 'Saved!';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    } catch (err) {
      msg.className = 'save-msg err'; msg.textContent = 'Error: ' + err.message;
      setTimeout(() => { msg.textContent = ''; }, 3000);
    } finally {
      saveBtn.disabled = false;
    }
  });

  resetBtn.addEventListener('click', async () => {
    if (!window.confirm('Reset voice defaults to hardcoded values?')) return;
    resetBtn.disabled = true;
    msg.className = 'save-msg'; msg.textContent = 'Resetting…';
    try {
      const res = await fetch('/voice-defaults/reset', { method: 'POST' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      voiceDefaults = result.defaults;
      refreshVoiceForm(cardEl, voiceDefaults);
      msg.className = 'save-msg ok'; msg.textContent = 'Reset complete';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    } catch (err) {
      msg.className = 'save-msg err'; msg.textContent = 'Error: ' + err.message;
      setTimeout(() => { msg.textContent = ''; }, 3000);
    } finally {
      resetBtn.disabled = false;
    }
  });

  return frag;
}

function refreshVoiceForm(cardEl, data) {
  const body = cardEl.querySelector('.card-body');
  body.innerHTML = '';
  body.appendChild(buildVoiceForm(data, cardEl));
}

function buildPresetEditor(key, title, description, preset, accentCls, cardEl) {
  const p = el('div', {class:'preset-card'});
  const hdr = el('div', {class:`preset-header ${accentCls}`}, title, el('small', {}, description));
  p.appendChild(hdr);

  const body = el('div', {class:'preset-body'});
  p.appendChild(body);

  function update(field, val) {
    voiceDefaults[key][field] = val;
    // Re-render just this preset card's content
    rebuildPresetBody(body, key, preset, cardEl);
  }
  rebuildPresetBody(body, key, preset, cardEl);
  return p;
}

function rebuildPresetBody(body, key, _unused, cardEl) {
  body.innerHTML = '';
  const preset = voiceDefaults[key];

  // VAD type
  const vadField = el('div', {});
  const vadLabel = el('div', {class:'field-label'}, 'Detection Mode ', el('span', {class:'badge badge-api'}, 'API'));
  vadField.appendChild(vadLabel);
  const vadSelect = el('select', {class:'field-select'});
  [['server_vad','Server VAD (volume-based)'],['semantic_vad','Semantic VAD (AI-based)'],['none','None (manual)']].forEach(([v,t]) => {
    const o = el('option', {value:v}, t);
    if (preset.vad_type === v) o.selected = true;
    vadSelect.appendChild(o);
  });
  vadSelect.addEventListener('change', () => {
    voiceDefaults[key].vad_type = vadSelect.value;
    rebuildPresetBody(body, key, null, cardEl);
  });
  vadField.appendChild(vadSelect);
  body.appendChild(vadField);

  // Eagerness (semantic only)
  if (preset.vad_type === 'semantic_vad') {
    const ef = el('div', {});
    ef.appendChild(el('div', {class:'field-label'}, 'Eagerness ', el('span', {class:'badge badge-sem'}, 'Semantic VAD')));
    ef.appendChild(el('div', {class:'field-hint', style:{marginBottom:'6px'}}, 'How quickly the model responds after you stop speaking'));
    const row = el('div', {class:'eagerness-row'});
    ['low','medium','high','auto'].forEach(level => {
      const active = (preset.eagerness ?? 'auto') === level;
      const btn = el('button', {class:'eagerness-btn' + (active ? ' active' : '')}, level);
      btn.addEventListener('click', () => {
        voiceDefaults[key].eagerness = level;
        rebuildPresetBody(body, key, null, cardEl);
      });
      row.appendChild(btn);
    });
    ef.appendChild(row);
    body.appendChild(ef);
  }

  // Server VAD specific fields
  if (preset.vad_type === 'server_vad') {
    body.appendChild(buildSlider(key, 'threshold', 'Sensitivity', 'Server VAD', 0, 1, 0.01,
      v => v.toFixed(2), 'Lower = picks up quieter sounds'));
    body.appendChild(buildSlider(key, 'prefix_padding_ms', 'Lead-in Buffer', 'Server VAD', 0, 2000, 10,
      v => v + 'ms', 'Audio kept before speech detected'));
    body.appendChild(buildSlider(key, 'silence_duration_ms', 'Pause Before Response', 'Server VAD', 0, 5000, 10,
      v => v + 'ms', 'Silence needed before assistant replies'));
  }
}

function buildSlider(key, field, label, badgeText, min, max, step, display, hint) {
  const wrap = el('div', {});
  const row = el('div', {class:'slider-row'});
  row.appendChild(el('div', {class:'field-label'}, label + ' ', el('span', {class:'badge badge-srv'}, badgeText)));
  const valSpan = el('span', {class:'slider-val'}, display(voiceDefaults[key][field]));
  row.appendChild(valSpan);
  wrap.appendChild(row);
  const input = el('input', {type:'range', min, max, step, value: voiceDefaults[key][field]});
  input.addEventListener('input', () => {
    const v = Number(input.value);
    voiceDefaults[key][field] = v;
    valSpan.textContent = display(v);
  });
  wrap.appendChild(input);
  wrap.appendChild(el('div', {class:'field-hint'}, hint));
  return wrap;
}

// ──────────────────────────────────────────────
// Catalog (Tools + Agents)
// ──────────────────────────────────────────────
let catalogTools = [];
let agentsInfo = {};
let agentSchemas = {};
let allowNameDrafts = {};
let agentSaveState = {}; // agentId -> 'idle'|'saving'|'saved'|'error'
let agentSaveMsg = {};   // agentId -> str

function formatAgentLabel(id) {
  return id.split(/[-_\s]+/).filter(Boolean)
    .map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ') || id;
}

function sortedAgents() {
  return Object.keys(agentsInfo).sort((a,b) => {
    if (a===b) return 0;
    if (a==='base') return -1; if (b==='base') return 1;
    if (a==='supervisor') return -1; if (b==='supervisor') return 1;
    return a.localeCompare(b);
  });
}

function renderCatalog() {
  content.innerHTML = '<div class="loading">Loading tools and agents…</div>';

  Promise.all([
    fetch('/catalog/tools').then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status)),
    fetch('/agents').then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status)),
  ]).then(async ([tools, agents]) => {
    catalogTools = tools;
    agentsInfo = agents;
    allowNameDrafts = {};
    agentSaveState = {};
    agentSaveMsg = {};

    // Init allow-name drafts
    for (const [id, entry] of Object.entries(agents)) {
      allowNameDrafts[id] = (entry.policy?.allowNames ?? []).slice().sort((a,b) => a.localeCompare(b));
      agentSaveState[id] = 'idle';
      agentSaveMsg[id] = '';
    }

    // Load agent tool schemas in parallel
    agentSchemas = {};
    await Promise.all(Object.keys(agents).map(async id => {
      try {
        const r = await fetch(`/agents/${id}/tools`);
        if (r.ok) agentSchemas[id] = await r.json();
      } catch {}
    }));

    buildCatalogUI();
  }).catch(err => {
    content.innerHTML = `<div class="error-msg">Failed to load: ${err}</div>`;
  });
}

function buildCatalogUI() {
  content.innerHTML = '';

  // Jump-to shortcuts
  const jumpBar = el('div', {class:'tool-jump-bar'});
  const jumpLabel = el('span', {class:'filter-label'}, 'Jump to:');
  jumpBar.appendChild(jumpLabel);
  [['all-tools', 'All Tools'], ...sortedAgents().map(id => [`agent-sec-${id}`, formatAgentLabel(id)])].forEach(([target, label]) => {
    const btn = el('button', {class:'filter-btn'}, label);
    btn.addEventListener('click', () => {
      const el = document.getElementById(target);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    jumpBar.appendChild(btn);
  });
  content.appendChild(jumpBar);

  // Tool catalogue card
  const tc = card('Registered Tools', body => {
    if (catalogTools.length === 0) {
      body.appendChild(el('div', {class:'empty-msg'}, 'No tools discovered.'));
      return;
    }
    const list = el('div', {class:'tool-list', id:'all-tools'});
    catalogTools.forEach(tool => {
      const item = el('div', {class:'tool-item'});
      const row1 = el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:'8px',flexWrap:'wrap'}});
      row1.appendChild(el('span', {class:'tool-name'}, tool.name));
      row1.appendChild(el('span', {class:'tool-id'}, tool.id));
      item.appendChild(row1);
      if (tool.description) item.appendChild(el('div', {class:'tool-desc'}, tool.description));
      const tags = el('div', {class:'tag-row'});
      tags.appendChild(el('span', {class:'tag origin'}, tool.origin));
      (tool.tags || []).forEach(t => tags.appendChild(el('span', {class:'tag'}, t)));
      tags.appendChild(el('span', {class:'tag'}, tool.sanitizedName));
      item.appendChild(tags);
      list.appendChild(item);
    });
    body.appendChild(list);
  });
  content.appendChild(tc);

  // Agent sections
  sortedAgents().forEach(id => {
    const ac = card(formatAgentLabel(id) + ' Agent', body => {
      buildAgentSection(body, id);
    });
    ac.id = `agent-sec-${id}`;
    content.appendChild(ac);
  });
}

function buildAgentSection(container, agentId) {
  const body = el('div', {class:'agent-body'});

  const entry = agentsInfo[agentId] ?? {};

  // Allow tags (read-only)
  const allowTags = entry.policy?.allowTags ?? [];
  if (allowTags.length) {
    const at = el('div', {});
    at.appendChild(el('div', {class:'sub-label'}, 'Allow Tags'));
    const chips = el('div', {class:'chips'});
    allowTags.forEach(t => chips.appendChild(el('span', {class:'chip'}, t)));
    at.appendChild(chips);
    body.appendChild(at);
  }

  // Allow names (editable)
  const anWrap = el('div', {id:`allow-names-${agentId}`});
  renderAllowNames(anWrap, agentId);
  body.appendChild(anWrap);

  // Resolved tools
  const resolved = entry.tools ?? [];
  const rt = el('div', {});
  rt.appendChild(el('div', {class:'sub-label'}, 'Resolved Tool Identifiers'));
  const rc = el('div', {class:'chips'});
  if (resolved.length === 0) rc.appendChild(el('span', {class:'empty-msg'}, 'No tools resolved'));
  else resolved.forEach(t => rc.appendChild(el('span', {class:'chip resolved-pill'}, t)));
  rt.appendChild(rc);
  body.appendChild(rt);

  // Schema
  const schema = agentSchemas[agentId];
  if (schema !== undefined) {
    const sd = el('div', {});
    sd.appendChild(el('div', {class:'sub-label'}, 'Responses API Payload'));
    const pre = el('pre', {class:'schema-pre'}, JSON.stringify(schema, null, 2));
    sd.appendChild(pre);
    body.appendChild(sd);
  }

  container.appendChild(body);
}

function renderAllowNames(wrap, agentId) {
  wrap.innerHTML = '';
  const draft = allowNameDrafts[agentId] ?? [];
  const serverNames = agentsInfo[agentId]?.policy?.allowNames ?? [];
  const isDirty = !arrEq(draft, serverNames);

  wrap.appendChild(el('div', {class:'sub-label'}, 'Allow Names (editable)'));

  // Current chips
  const chips = el('div', {class:'chips', style:{marginBottom:'8px', minHeight:'24px'}});
  if (draft.length === 0) chips.appendChild(el('span', {class:'empty-msg'}, 'None (all tools allowed)'));
  else draft.forEach(name => {
    const chip = el('span', {class:'chip'});
    chip.appendChild(document.createTextNode(name));
    const rm = el('button', {class:'chip-remove', title:'Remove'}, '×');
    rm.addEventListener('click', () => {
      allowNameDrafts[agentId] = draft.filter(n => n !== name);
      renderAllowNames(wrap, agentId);
    });
    chip.appendChild(rm);
    chips.appendChild(chip);
  });
  wrap.appendChild(chips);

  // Add from dropdown
  const available = catalogTools.filter(t => !draft.includes(t.name)).sort((a,b) => a.name.localeCompare(b.name));
  if (available.length > 0) {
    const addRow = el('div', {class:'allow-add-row', style:{marginBottom:'10px'}});
    const sel = el('select', {class:'field-select'});
    sel.appendChild(el('option', {value:''}, '— add tool —'));
    available.forEach(t => sel.appendChild(el('option', {value:t.name}, t.name)));
    const addBtn = el('button', {class:'btn btn-ghost btn-sm'}, 'Add');
    addBtn.addEventListener('click', () => {
      const name = sel.value;
      if (!name) return;
      allowNameDrafts[agentId] = [...(allowNameDrafts[agentId] ?? []), name].sort((a,b) => a.localeCompare(b));
      renderAllowNames(wrap, agentId);
    });
    addRow.appendChild(sel);
    addRow.appendChild(addBtn);
    wrap.appendChild(addRow);
  }

  // Save row
  const saveRow = el('div', {class:'agent-save-row'});
  const saveBtn = el('button', {class:'btn btn-primary btn-sm'}, 'Save');
  saveBtn.disabled = !isDirty;
  const msgSpan = el('span', {class:'save-msg'}, agentSaveMsg[agentId] ?? '');
  if (agentSaveState[agentId] === 'saved') msgSpan.className = 'save-msg ok';
  if (agentSaveState[agentId] === 'error') msgSpan.className = 'save-msg err';
  saveBtn.addEventListener('click', () => saveAgentAllowNames(agentId, wrap));
  saveRow.appendChild(saveBtn);
  saveRow.appendChild(msgSpan);
  wrap.appendChild(saveRow);
}

async function saveAgentAllowNames(agentId, wrap) {
  const names = allowNameDrafts[agentId] ?? [];
  agentSaveState[agentId] = 'saving';
  agentSaveMsg[agentId] = 'Saving…';
  renderAllowNames(wrap, agentId);

  try {
    const res = await fetch(`/agents/${agentId}/policy`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ allowNames: names }),
    });
    if (!res.ok) {
      let msg = 'HTTP ' + res.status;
      try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
      throw new Error(msg);
    }
    const payload = await res.json();
    if (!payload?.agent) throw new Error('Unexpected response');
    agentsInfo[agentId] = payload.agent;
    allowNameDrafts[agentId] = (payload.agent.policy?.allowNames ?? []).slice().sort((a,b) => a.localeCompare(b));
    agentSaveState[agentId] = 'saved';
    agentSaveMsg[agentId] = 'Saved!';

    // Refresh schema
    try {
      const sr = await fetch(`/agents/${agentId}/tools`);
      if (sr.ok) agentSchemas[agentId] = await sr.json();
    } catch {}

    renderAllowNames(wrap, agentId);
    setTimeout(() => {
      agentSaveState[agentId] = 'idle';
      agentSaveMsg[agentId] = '';
      renderAllowNames(wrap, agentId);
    }, 2500);
  } catch (err) {
    agentSaveState[agentId] = 'error';
    agentSaveMsg[agentId] = 'Error: ' + err.message;
    renderAllowNames(wrap, agentId);
    setTimeout(() => {
      agentSaveState[agentId] = 'idle';
      agentSaveMsg[agentId] = '';
      renderAllowNames(wrap, agentId);
    }, 4000);
  }
}

function arrEq(a, b) {
  const sa = [...a].sort((x,y) => x.localeCompare(y));
  const sb = [...b].sort((x,y) => x.localeCompare(y));
  return sa.length === sb.length && sa.every((v,i) => v === sb[i]);
}

// ──────────────────────────────────────────────

    const wrap = el('div', {class:'iframe-wrap'});

// ──────────────────────────────────────────────
// Memory
// ──────────────────────────────────────────────
let memoryConfig = null;

function renderMemory() {
  const c = card('Memory', body => {
    body.innerHTML = '<div class="loading">Loading\u2026</div>';
  });
  content.appendChild(c);

  fetch('/memory-config')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      memoryConfig = data;
      const body = c.querySelector('.card-body');
      body.innerHTML = '';
      body.appendChild(buildMemoryForm(data));
    })
    .catch(err => {
      c.querySelector('.card-body').innerHTML = `<div class="error-msg">Failed to load: ${err.message}</div>`;
    });
}

function buildMemoryForm(data) {
  const frag = document.createDocumentFragment();
  const fieldRow = el('div', {style: 'display:flex;flex-direction:column;gap:14px;max-width:420px'});

  // Backend toggle
  const backendWrap = el('div', {style: 'display:flex;flex-direction:column;gap:4px'});
  backendWrap.appendChild(el('label', {style: 'font-size:13px;color:var(--text-muted)'}, 'Memory backend'));
  backendWrap.appendChild(el('small', {style: 'font-size:11px;color:var(--text-muted)'}, 'Mem0 uses a hosted cloud service. Adaptive uses local SQLite with embeddings, strength scoring, and consolidation.'));
  const toggleRow = el('div', {style: 'display:flex;gap:6px;margin-top:4px'});
  ['mem0', 'adaptive'].forEach(val => {
    const btn = el('button', {
      class: 'filter-btn' + (data.backend === val ? ' active' : ''),
      style: 'padding:5px 16px;font-size:12px',
    }, val === 'mem0' ? 'Mem0' : 'Adaptive');
    btn.addEventListener('click', () => {
      memoryConfig.backend = val;
      toggleRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    toggleRow.appendChild(btn);
  });
  backendWrap.appendChild(toggleRow);
  fieldRow.appendChild(backendWrap);

  const timeoutWrap = el('div', {style: 'display:flex;flex-direction:column;gap:4px'});
  timeoutWrap.appendChild(el('label', {style: 'font-size:13px;color:var(--text-muted)'}, 'Retrieval timeout (ms)'));
  timeoutWrap.appendChild(el('small', {style: 'font-size:11px;color:var(--text-muted)'}, 'Max wait for memories before LLM call proceeds (100\u2013 10000)'));
  const timeoutInput = el('input', {
    type: 'number', min: '100', max: '10000', step: '100',
    value: String(data.retrieve_timeout_ms),
    style: 'width:130px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px'
  });
  timeoutInput.addEventListener('input', e => { memoryConfig.retrieve_timeout_ms = Number(e.target.value); });
  timeoutWrap.appendChild(timeoutInput);
  fieldRow.appendChild(timeoutWrap);

  const modelWrap = el('div', {style: 'display:flex;flex-direction:column;gap:4px'});
  modelWrap.appendChild(el('label', {style: 'font-size:13px;color:var(--text-muted)'}, 'Extraction model'));
  modelWrap.appendChild(el('small', {style: 'font-size:11px;color:var(--text-muted)'}, 'LLM used to extract durable facts from completed turns'));
  const modelInput = el('input', {
    type: 'text', value: data.extraction_model,
    style: 'width:240px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px'
  });
  modelInput.addEventListener('input', e => { memoryConfig.extraction_model = e.target.value; });
  modelWrap.appendChild(modelInput);
  fieldRow.appendChild(modelWrap);
  frag.appendChild(fieldRow);

  const saveRow = el('div', {style: 'display:flex;align-items:center;gap:12px;margin-top:20px'});
  const saveBtn = el('button', {class: 'btn btn-primary'}, 'Save Changes');
  const msg = el('span', {class: 'save-msg'});
  saveRow.appendChild(saveBtn);
  saveRow.appendChild(msg);
  frag.appendChild(saveRow);

  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    msg.className = 'save-msg'; msg.textContent = 'Saving\u2026';
    try {
      const res = await fetch('/memory-config', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(memoryConfig),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      memoryConfig = result.config;
      msg.className = 'save-msg ok'; msg.textContent = 'Saved!';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    } catch (err) {
      msg.className = 'save-msg err'; msg.textContent = 'Error: ' + err.message;
      setTimeout(() => { msg.textContent = ''; }, 3000);
    } finally {
      saveBtn.disabled = false;
    }
  });

  return frag;
}

// ──────────────────────────────────────────────
// Maintenance
// ──────────────────────────────────────────────
let resetStatus = 'idle';

function renderMaintenance() {
  const c = card('Maintenance', body => {
    const desc = el('p', {style:{fontSize:'12px',color:'var(--text-mid)',marginBottom:'14px'}},
      'Closes active connections (voice, chat, observability) and clears server-side chat history.');
    body.appendChild(desc);
    const btn = el('button', {class:'btn btn-danger', id:'reset-btn'},
      resetStatus === 'resetting' ? 'Resetting…' :
      resetStatus === 'done'      ? 'Reset Complete ✓' :
      resetStatus === 'error'     ? 'Reset Failed' : 'Reset All Sessions');
    btn.disabled = resetStatus === 'resetting';
    btn.addEventListener('click', doReset.bind(null, c));
    body.appendChild(btn);
  });
  content.appendChild(c);
}

async function doReset(c) {
  if (!window.confirm('Reset all sessions? This will clear chat history and close all connections.')) return;
  resetStatus = 'resetting';
  refreshMaintenance(c);
  try {
    const res = await fetch('/session/reset', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ chatHistory: true, connections: true }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    resetStatus = 'done';
  } catch {
    resetStatus = 'error';
  }
  refreshMaintenance(c);
  setTimeout(() => { resetStatus = 'idle'; refreshMaintenance(c); }, 3000);
}

function refreshMaintenance(c) {
  const body = c.querySelector('.card-body');
  body.innerHTML = '';
  const desc = el('p', {style:{fontSize:'12px',color:'var(--text-mid)',marginBottom:'14px'}},
    'Closes active connections (voice, chat, observability) and clears server-side chat history.');
  body.appendChild(desc);
  const btn = el('button', {class:'btn btn-danger', id:'reset-btn'},
    resetStatus === 'resetting' ? 'Resetting…' :
    resetStatus === 'done'      ? 'Reset Complete ✓' :
    resetStatus === 'error'     ? 'Reset Failed' : 'Reset All Sessions');
  btn.disabled = resetStatus === 'resetting';
  btn.addEventListener('click', () => doReset(c));
  body.appendChild(btn);
}

// ──────────────────────────────────────────────
// About
// ──────────────────────────────────────────────
function renderAbout() {
  const c = card('About', body => {
    body.innerHTML = '<div class="loading">Loading…</div>';
  });
  content.appendChild(c);

  fetch('/build-info.json')
    .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status))

      const body = c.querySelector('.card-body');
      body.innerHTML = '';
      const kv = (k, v) => {
        const d = el('div', {class:'kv-pair'});
        d.appendChild(el('div', {class:'kv-key'}, k));
        d.appendChild(el('div', {class:'kv-val'}, v || '—'));
        return d;
      };
      body.appendChild(kv('Commit', info.commitId));
      body.appendChild(kv('Message', info.commitMessage));
    })
    .catch(err => {
      c.querySelector('.card-body').innerHTML = `<div class="error-msg">Could not load build info: ${err}</div>`;
    });
}
