<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Servers · HK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1b1d27; --surface: #22253a; --surface2: #2a2d42; --surface3: #181a26;
      --border: #2e3150; --border2: #383b5e; --accent: #818cf8; --accent-dim: rgba(129,140,248,0.12);
      --green: #34d399; --green-dim: rgba(52,211,153,0.1);
      --red: #f87171; --red-dim: rgba(248,113,113,0.1);
      --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.1);
      --text: #e2e4f0; --text-mid: #6b7194; --text-dim: #3d4268;
      --font: 'SF Mono','Fira Code','Consolas',monospace;
      --font-ui: -apple-system,BlinkMacSystemFont,'Inter',sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; display: flex; flex-direction: column; font-size: 13px; -webkit-font-smoothing: antialiased; }
    header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface3); flex-shrink: 0; }
    .back-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--text-mid); font-size: 11px; font-family: var(--font); cursor: pointer; text-decoration: none; }
    .back-btn:hover { color: var(--text); }
    h1 { font-size: 14px; font-weight: 600; }
    .hdr-sub { font-size: 11px; color: var(--text-mid); max-width: 400px; margin-left: 4px; }
    .hdr-right { margin-left: auto; display: flex; gap: 8px; }
    .btn { padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text-mid); font-size: 12px; font-family: var(--font-ui); cursor: pointer; }
    .btn:hover:not(:disabled) { color: var(--text); background: var(--surface2); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: rgba(129,140,248,0.2); }
    .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden; }
    .panel { display: flex; flex-direction: column; overflow: hidden; padding: 20px; gap: 12px; }
    .panel + .panel { border-left: 1px solid var(--border); }
    .panel-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); font-family: var(--font); }
    textarea {
      flex: 1; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; padding: 10px 12px; font-family: var(--font); font-size: 12px;
      color: var(--text); outline: none; resize: none; min-height: 300px; line-height: 1.5;
    }
    textarea:focus { border-color: var(--accent); }
    .server-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .server-list::-webkit-scrollbar { width: 3px; }
    .server-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .server-card { border: 1px solid var(--border2); border-radius: 8px; padding: 12px; background: var(--surface2); }
    .sc-name { font-size: 12px; font-weight: 600; color: var(--text); font-family: var(--font); }
    .sc-url { font-size: 11px; color: var(--text-mid); font-family: var(--font); margin-top: 3px; word-break: break-all; }
    .sc-status { font-size: 10px; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
    .sc-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sc-dot.ok { background: var(--green); }
    .sc-dot.err { background: var(--red); }
    .sc-dot.pending { background: var(--text-dim); }
    .sc-tools { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: var(--font); }
    .sc-tool-tag { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; margin: 2px; }
    .notice { padding: 8px 12px; border-radius: 5px; font-size: 12px; }
    .notice-ok { background: var(--green-dim); border: 1px solid rgba(52,211,153,0.25); color: var(--green); }
    .notice-err { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
    .dirty-indicator { font-size: 11px; color: var(--amber); font-family: var(--font); }
    @media (max-width: 700px) { .main { grid-template-columns: 1fr; } .panel + .panel { border-left: none; border-top: 1px solid var(--border); } }
  </style>
</head>
<body>
  <header>
    <a class="back-btn" href="/">← back</a>
    <h1>Remote MCP Servers</h1>
    <div class="hdr-right">
      <button class="btn" id="refresh-btn">refresh</button>
      <button class="btn btn-primary" id="save-btn" disabled>save</button>
      <span class="dirty-indicator" id="dirty-indicator" style="display:none;">unsaved changes</span>
    </div>
  </header>
  <div id="notice" style="display:none;margin:12px 20px;"></div>
  <div class="main">
    <div class="panel">
      <div class="panel-label">JSON configuration</div>
      <div style="font-size:11px;color:var(--text-dim);">Edit the JSON array of remote MCP servers. Save to apply immediately.</div>
      <textarea id="config-editor" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <div class="panel-label">configured servers</div>
      <div class="server-list" id="server-list"><div style="color:var(--text-dim);font-size:12px;">loading…</div></div>
    </div>
  </div>

<script>
  let originalText = '';
  let saving = false;

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function setNotice(msg, type) {
    const el = document.getElementById('notice');
    if (!msg) { el.style.display = 'none'; return; }
    el.className = `notice notice-${type}`;
    el.textContent = msg;
    el.style.display = '';
  }

  function renderServers(servers, discoveryStatus) {
    const list = document.getElementById('server-list');
    if (!servers || !servers.length) {
      list.innerHTML = '<div style="font-size:12px;color:var(--text-dim);">no servers configured</div>';
      return;
    }
    list.innerHTML = servers.map(srv => {
      const status = discoveryStatus?.[srv.name] || {};
      const dotClass = status.status === 'connected' ? 'ok' : status.status === 'error' ? 'err' : 'pending';
      const statusText = status.status || 'unknown';
      const tools = status.tools || [];
      return `<div class="server-card">
        <div class="sc-name">${esc(srv.name || '(unnamed)')}</div>
        <div class="sc-url">${esc(srv.url || srv.command || '')}</div>
        <div class="sc-status">
          <div class="sc-dot ${dotClass}"></div>
          <span style="color:var(--text-mid);font-size:10px;font-family:var(--font);">${esc(statusText)}</span>
          ${status.toolCount != null ? `<span style="color:var(--text-dim);font-size:10px;font-family:var(--font);">${status.toolCount} tools</span>` : ''}
        </div>
        ${tools.length ? `<div class="sc-tools">${tools.map(t => `<span class="sc-tool-tag">${esc(t)}</span>`).join('')}</div>` : ''}
        ${status.error ? `<div style="font-size:10px;color:var(--red);margin-top:4px;font-family:var(--font);">${esc(status.error)}</div>` : ''}
      </div>`;
    }).join('');
  }

  async function load() {
    setNotice(null);
    try {
      const res = await fetch('/api/mcp-config');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const editor = document.getElementById('config-editor');
      editor.value = data.text || '';
      originalText = data.text || '';
      updateDirty();
      renderServers(data.servers, data.discoveryStatus);
    } catch (e) {
      setNotice(e.message, 'err');
    }
  }

  function updateDirty() {
    const editor = document.getElementById('config-editor');
    const dirty = editor.value !== originalText;
    document.getElementById('save-btn').disabled = !dirty || saving;
    document.getElementById('dirty-indicator').style.display = dirty ? '' : 'none';
  }

  async function save() {
    if (saving) return;
    saving = true;
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'saving…';
    setNotice(null);
    try {
      const text = document.getElementById('config-editor').value;
      // Validate JSON before sending
      JSON.parse(text);
      const res = await fetch('/api/mcp-config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const result = await res.json();
      originalText = text;
      updateDirty();
      renderServers(result.servers, result.discoveryStatus);
      setNotice('Configuration saved and MCP discovery reloaded.', 'ok');
    } catch (e) {
      setNotice(e.message, 'err');
    } finally {
      saving = false;
      saveBtn.textContent = 'save';
      updateDirty();
    }
  }

  document.getElementById('config-editor').addEventListener('input', updateDirty);
  document.getElementById('refresh-btn').addEventListener('click', load);
  document.getElementById('save-btn').addEventListener('click', save);

  load();
</script>
</body>
</html>
